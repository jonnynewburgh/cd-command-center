services:
  - type: web
    name: cd-command-center
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: DATABASE_URL
        value: /data/cd_command_center.sqlite
      - key: PYTHON_VERSION
        value: "3.11"
    disk:
      name: db-storage
      mountPath: /data
      sizeGB: 1
