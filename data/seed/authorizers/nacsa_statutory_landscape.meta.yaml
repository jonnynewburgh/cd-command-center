# Companion metadata for nacsa_statutory_landscape.csv
source_url: https://www.qualitycharters.org/state-policy/multiple-authorizers/list-of-charter-school-authorizers-by-state/
retrieved: "2026-05-04"
description: >
  Statutory categories of charter authorizer types permitted in each U.S. state
  and D.C., transcribed from NACSA Quality Charters public policy reference.
  This is not an exhaustive roster of individual authorizing entities; those rows
  belong in a separate operational registry (state DOE open data + NCES CCD joins).

columns:
  nacsa_col_1: First policy column on the NACSA page (typically primary paths).
  nacsa_col_2: Second policy column (often appeal-limited or alternate paths).
  nacsa_col_3: Third policy column where present.
  nacsa_col_4: Fourth policy column where present.

notes:
  - Colorado lists ICB twice in the source table; values are transcribed as-is.
  - Hawaii lists HEI, NEG, NFP as shown on the source page at retrieval time.
  - Where the source states "No Charter Law", treat as no statutory charter framework.
